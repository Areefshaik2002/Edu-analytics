version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: edu-analytics-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: edu_analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edu-analytics-backend
    restart: always
    environment:
      PORT: 5001
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/edu_analytics?schema=public
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: password123
      JWT_SECRET: supersecretjwttokenkey
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    container_name: edu-analytics-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  postgres_data:
